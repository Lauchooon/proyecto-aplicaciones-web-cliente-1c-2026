<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito de Compras - AutoRepuestos</title>
    <link rel="stylesheet" href="/style/style.css">
    <meta name="description" content="Revisa tu carrito de compras antes de finalizar.">
    <script src="/js/config.js" defer></script>
    <script src="/js/script.js" defer></script>
</head>
<body>
    <header class="ml-header">
        <div class="ml-header-top">
            <a href="/" class="ml-logo">
                <span class="ml-logo-icon">🏠</span>
                <div class="ml-logo-text">
                    <span class="ml-logo-title">Repuestos</span>
                    <span class="ml-logo-subtitle">Pepito</span>
                </div>
            </a>

            <div class="ml-search">
                <form action="/search" method="get" class="ml-search-form">
                    <input type="text" placeholder="Buscar productos, marcas, categorías..." class="ml-search-input">
                    <button type="submit" class="ml-search-btn">
                        <span>🔍</span>
                    </button>
                </form>
            </div>

            <a href="/cart.html" class="ml-cart-icon">
                <span>🛒</span>
                <span class="ml-cart-count" id="cart-header-count">0</span>
            </a>
            <div class="ml-header-actions">
                <nav class="ml-nav">
                    <ul class="ml-nav-list">
                        <li><a href="/" class="ml-nav-link">Ofertas</a></li>
                        <li><a href="/about.html" class="ml-nav-link">Nosotros</a></li>
                        <li><a href="/contact.html" class="ml-nav-link">Contacto</a></li>
                        <li><a href="/new-product.html" class="ml-nav-link">Admin</a></li>
                    </ul>
                </nav>
            </div>
        </div>

        <div class="ml-categories-bar">
            <ul class="ml-categories-list">
                <li><a href="#">Motor</a></li>
                <li><a href="#">Frenos</a></li>
                <li><a href="#">Suspensión</a></li>
                <li><a href="#">Eléctrico</a></li>
                <li><a href="#">Carrocería</a></li>
                <li><a href="#">Accesorios</a></li>
            </ul>
        </div>
    </header>

    <main class="cart-main">
        <h1 class="cart-title">Tu Carrito</h1>
        <p class="cart-subtitle" id="cart-subtitle">Revisá los productos antes de comprar</p>

        <div id="cart-container" class="cart-layout">
            <div id="cart-items" class="cart-items">
            </div>

            <aside id="cart-summary" class="cart-summary">
                <h2 class="cart-summary-title">Resumen</h2>
                <div id="summary-content">
                    <div class="cart-summary-row">
                        <span>Productos</span>
                        <span class="cart-summary-value" id="summary-items">0</span>
                    </div>
                    <div class="cart-summary-row">
                        <span>Envío</span>
                        <span class="cart-summary-value" id="summary-shipping">Gratis</span>
                    </div>
                    <div class="cart-summary-row total">
                        <span>Total</span>
                        <span class="cart-summary-value" id="summary-total">$0</span>
                    </div>
                    <button type="button" class="cart-checkout-btn" id="checkout-btn">Iniciar compra</button>
                </div>
            </aside>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 AutoRepuestos. Todos los derechos reservados.</p>
    </footer>
</body>
</html>
