<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore - Contacto</title>
    <meta name="description" content="Contacta con TechStore - Tu tienda de informática">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1><a href="index.html">TechStore</a></h1>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="productos.html">Productos</a></li>
                <li><a href="sobre-nosotros.html">Sobre Nosotros</a></li>
                <li><a href="contact.html">Contacto</a></li>
                <li><a href="new-product.html">Alta Producto</a></li>
                <li><a href="login-user.html">Iniciar Sesión</a></li>
            </ul>
            <div class="buscador">
                <input type="checkbox" id="buscador-toggle">
                <label for="buscador-toggle" class="buscador-lupa">🔍</label>
                <form class="buscador-input">
                    <input type="text" name="busqueda" placeholder="Buscar productos...">
                </form>
            </div>
        </nav>
    </header>

    <main>
        <section id="contacto">
            <h2>Contáctenos</h2>
            <form action="#" method="get">
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" name="nombre" required>
                
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                
                <label for="telefono">Teléfono:</label>
                <input type="tel" id="telefono" name="telefono">
                
                <label for="mensaje">Mensaje:</label>
                <textarea id="mensaje" name="mensaje" rows="5" required></textarea>
                
                <button type="submit">Enviar Mensaje</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 TechStore. Todos los derechos reservados.</p>
    </footer>
</body>
</html>
