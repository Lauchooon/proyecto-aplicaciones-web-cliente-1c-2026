<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alta de Producto - TechStore</title>
    <meta name="description" content="Agregar nuevo producto a nuestro catálogo de informática">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/navegacion.css">
    <link rel="stylesheet" href="css/formularios.css">
</head>
<body>
    <header>
<h1><a href="index.html">TechStore</a></h1>
    <input type="checkbox" id="nav-toggle" class="nav-toggle">
    <label for="nav-toggle" class="hamburger">☰</label>
    <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="productos.html">Productos</a></li>
                <li><a href="sobre-nosotros.html">Sobre Nosotros</a></li>
                <li><a href="contact.html">Contacto</a></li>
                <li><a href="new-product.html">Alta Producto</a></li>
                <li class="nav-carrito"><a href="carrito.html">Carrito<span class="carrito-badge" id="carrito-badge">0</span></a><div class="carrito-preview" id="carrito-preview"></div></li>
                <li><a href="login-user.html">Iniciar Sesión</a></li>
            </ul>
            <div class="buscador">
                <input type="checkbox" id="buscador-toggle">
                <label for="buscador-toggle" class="buscador-lupa">🔍</label>
                <form class="buscador-input">
                    <input type="text" name="busqueda" placeholder="Buscar productos...">
                </form>
            </div>
        </nav>
    </header>

    <main>
        <section>
            <h2>Alta de Producto</h2>
            <p>Completa el formulario para agregar un nuevo producto al catálogo</p>

            <div id="mensaje-resultado" class="mensaje" style="display:none"></div>

            <form id="form-producto">
                <fieldset>
                    <legend>Información del Producto</legend>

                    <label for="nombre">Nombre del producto:</label>
                    <input type="text" id="nombre" name="nombre" required placeholder="Ej: Procesador Intel Core i7">

                    <label for="precio">Precio ($):</label>
                    <input type="number" id="precio" name="precio" step="0.01" min="0" required placeholder="Ej: 25.99">

                    <label for="categoria">Categoría:</label>
                    <select id="categoria" name="categoria" required>
                        <option value="">Seleccionar categoría</option>
                    </select>

                    <label for="imagen">URL de la imagen:</label>
                    <input type="url" id="imagen" name="imagen" placeholder="Ej: https://ejemplo.com/imagen.jpg">

                    <label for="descripcion">Descripción:</label>
                    <textarea id="descripcion" name="descripcion" rows="3" placeholder="Breve descripción del producto"></textarea>

                    <label>
                        <input type="checkbox" id="oferta" name="oferta">
                        Producto en oferta
                    </label>

                    <div id="grupo-precio-anterior" style="display:none">
                        <label for="precio_anterior">Precio anterior ($):</label>
                        <input type="number" id="precio_anterior" name="precio_anterior" step="0.01" min="0" placeholder="Ej: 35.99">
                    </div>
                </fieldset>

                <div class="botones">
                    <button type="submit">Guardar Producto</button>
                    <button type="reset">Limpiar Formulario</button>
                    <a href="index.html">Cancelar</a>
                </div>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 TechStore. Todos los derechos reservados.</p>
    </footer>

    <script src="js/supabase.js"></script>
    <script src="js/new-product.js"></script>
<script src="js/carrito-nav.js"></script>
</body>
</html>
