<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Producto - AutoRepuestos</title>
    <link rel="stylesheet" href="/style/style.css">
    <script src="/js/config.js" defer></script>
    <script src="/js/script.js" defer></script>
</head>
<body>
    <header class="ml-header">
        <div class="ml-header-top">
            <a href="/" class="ml-logo">
                <span class="ml-logo-icon">🏠</span>
                <div class="ml-logo-text">
                    <span class="ml-logo-title">Repuestos</span>
                    <span class="ml-logo-subtitle">Pepito</span>
                </div>
            </a>

            <div class="ml-search">
                <form action="/search" method="get" class="ml-search-form">
                    <input type="text" placeholder="Buscar productos, marcas, categorías..." class="ml-search-input">
                    <button type="submit" class="ml-search-btn">
                        <span>🔍</span>
                    </button>
                </form>
            </div>

            <div class="ml-header-actions">
                <nav class="ml-nav">
                    <ul class="ml-nav-list">
                        <li><a href="/" class="ml-nav-link">Inicio</a></li>
                        <li><a href="/about.html" class="ml-nav-link">Nosotros</a></li>
                        <li><a href="/contact.html" class="ml-nav-link">Contacto</a></li>
                        <li><a href="/new-product.html" class="ml-nav-link">Admin</a></li>
                    </ul>
                </nav>
            </div>
        </div>

        <div class="ml-categories-bar">
            <ul class="ml-categories-list">
                <li><a href="#">Motor</a></li>
                <li><a href="#">Frenos</a></li>
                <li><a href="#">Suspensión</a></li>
                <li><a href="#">Eléctrico</a></li>
                <li><a href="#">Carrocería</a></li>
                <li><a href="#">Accesorios</a></li>
            </ul>
        </div>
    </header>

    <main class="admin-main">
        <section id="new-product">
            <h2 class="form-title">Nuevo Producto</h2>
            <form id="product-form" class="admin-form">
                <div class="form-group">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" name="nombre" required>
                </div>

                <div class="form-group">
                    <label for="precio">Precio</label>
                    <input type="number" id="precio" name="precio" step="0.01" required>
                </div>

                <div class="form-group">
                    <label for="imageurl">URL de Imagen</label>
                    <input type="url" id="imageurl" name="imageurl" required>
                </div>

                <div class="form-group">
                    <label for="location">Ubicación</label>
                    <input type="text" id="location" name="location" required>
                </div>

                <div class="form-group">
                    <label for="quotes">Cuotas / Descripción</label>
                    <input type="text" id="quotes" name="quotes" required>
                </div>

                <button type="submit" class="form-submit">Guardar Producto</button>
            </form>

            <div id="form-message" class="form-message"></div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 AutoRepuestos. Todos los derechos reservados.</p>
    </footer>
</body>
</html>
